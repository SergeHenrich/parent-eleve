name: CD

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: frontend

      - name: Install backend deps (production)
        run: npm ci --omit=dev
        working-directory: backend

      - name: Zipper backend/node_modules
        run: |
          tar -czf node_modules.tar.gz node_modules
          rm -rf node_modules
        working-directory: backend

      - name: Nettoyer frontend node_modules
        run: rm -rf node_modules
        working-directory: frontend

      - name: Déployer via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.O2SWITCH_FTP_SERVER }}
          username: ${{ secrets.O2SWITCH_FTP_USERNAME }}
          password: ${{ secrets.O2SWITCH_FTP_PASSWORD }}
          port: ${{ secrets.O2SWITCH_FTP_PORT || 21 }}
          local-dir: ./
          server-dir: ${{ secrets.O2SWITCH_FTP_PATH }}
          exclude: |
            .git/
            .gitignore
            .env
            frontend/node_modules/

      - name: Dézipper & restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.O2SWITCH_HOST }}
          username: ${{ secrets.O2SWITCH_USERNAME }}
          key: ${{ secrets.O2SWITCH_KEY }}
          port: 21
          script: |
            cd ${{ secrets.O2SWITCH_PATH }}/backend
            tar -xzf node_modules.tar.gz
            rm -f node_modules.tar.gz
            cd ..
            pm2 restart edusmart 2>/dev/null || pm2 start backend/server.js --name edusmart
