name: CD

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: frontend

      - name: Sync files via rsync
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avz --delete --exclude=node_modules --exclude=.env --exclude=.git
          remote_path: ${{ secrets.O2SWITCH_PATH }}
          remote_host: ${{ secrets.O2SWITCH_HOST }}
          remote_user: ${{ secrets.O2SWITCH_USERNAME }}
          remote_key: ${{ secrets.O2SWITCH_KEY }}
          remote_port: 21

      - name: Install & restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.O2SWITCH_HOST }}
          username: ${{ secrets.O2SWITCH_USERNAME }}
          key: ${{ secrets.O2SWITCH_KEY }}
          port: 21
          script: |
            cd ${{ secrets.O2SWITCH_PATH }}
            npm install --prefix backend --omit=dev
            pm2 restart edusmart 2>/dev/null || pm2 start backend/server.js --name edusmart
